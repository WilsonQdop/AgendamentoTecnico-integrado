services:
  db:
    image: postgres:15-alpine
    container_name: postgres-agendamento-tecnico
    environment:
      POSTGRES_DB: agendamentos_db
      POSTGRES_USER: Qdop
      POSTGRES_PASSWORD: Qdop123
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U Qdop -d agendamentos_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spring-app-agendamento-tecnico
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=agendamentos_db
      - DB_USER=Qdop
      - DB_PASS=Qdop123
      - JWT_SECRET=${JWT_SECRET}
      - INITIAL_ADMIN_EMAIL={INITIAL_ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD={INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./backups:/app/backups
      - /var/run/docker.sock:/var/run/docker.sock
#      - ./Uploads_imagens:/app/Uploads_imagens